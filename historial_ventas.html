<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpa App Pro 🥭</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; }
        .container { max-width: 420px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .stock-info { background: #fff3cd; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-guardar { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Estilos para el Historial */
        .historial-container { margin-top: 30px; border-top: 2px solid #eee; pt: 15px; }
        .log-item { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; border-left: 4px solid #1a73e8; }
        .fecha { color: #888; font-size: 11px; display: block; }
        h3 { color: #333; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registro de Pulpa 🥭</h2>
        <div class="stock-info" id="avisoStock">Cargando...</div>

        <label>Fruta:</label>
        <select id="producto" onchange="actualizarVistaStock()">
            <option value="Mora">Mora 🍇</option>
            <option value="Pera">Pera 🍐</option>
            <option value="Mango">Mango 🥭</option>
            <option value="Durazno">Durazno 🍑</option>
            <option value="Guayaba">Guayaba 🟡</option>
            <option value="Lulo">Lulo 🍈</option>
            <option value="Fresa">Fresa 🍓</option>
            <option value="Tomate de Árbol">Tomate de Árbol 🍅</option>
        </select>

        <label>Cantidad (lb):</label>
        <input type="number" id="cantidad" placeholder="0.0" step="0.1">

        <button class="btn-guardar" onclick="guardar()">Registrar Venta</button>

        <div class="historial-container">
            <h3>Movimientos Recientes</h3>
            <div id="listaHistorial">Cargando historial...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYJ15P0bWb35dY8sbNuC0_4xcYFsuaz7A",
            authDomain: "pulpaapp-3ec88.firebaseapp.com",
            databaseURL: "https://pulpaapp-3ec88-default-rtdb.firebaseio.com",
            projectId: "pulpaapp-3ec88",
            storageBucket: "pulpaapp-3ec88.firebasestorage.app",
            messagingSenderId: "1036704181260",
            appId: "1:1036704181260:web:1213390bb88350cad09229"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let inventario = {};

        // 1. Escuchar Inventario
        db.ref('inventario').on('value', (snapshot) => {
            inventario = snapshot.val() || {};
            actualizarVistaStock();
        });

        // 2. Escuchar Historial (Trae los últimos 10 movimientos)
        db.ref('historial_ventas').limitToLast(10).on('value', (snapshot) => {
            const data = snapshot.val();
            const listaH = document.getElementById("listaHistorial");
            listaH.innerHTML = "";
            
            if (data) {
                // Convertir a array para mostrar el más reciente arriba
                Object.values(data).reverse().forEach(log => {
                    listaH.innerHTML += `
                        <div class="log-item">
                            <span class="fecha">${log.fecha}</span>
                            <b>-${log.cantidad} lb</b> de ${log.fruta}
                        </div>`;
                });
            } else {
                listaH.innerHTML = "No hay ventas registradas.";
            }
        });

        function actualizarVistaStock() {
            let p = document.getElementById("producto").value;
            let stock = inventario[p] || 0;
            document.getElementById("avisoStock").innerText = "Stock: " + stock + " lb de " + p;
        }

        function guardar() {
            let p = document.getElementById("producto").value;
            let cant = parseFloat(document.getElementById("cantidad").value);
            let ahora = new Date();
            let fechaTexto = ahora.toLocaleDateString() + " " + ahora.toLocaleTimeString();

            if (isNaN(cant) || cant <= 0 || cant > inventario[p]) {
                alert("Cantidad no válida o insuficiente");
                return;
            }

            // A. Actualizar Stock
            let nuevoStock = Math.round((inventario[p] - cant) * 100) / 100;
            db.ref('inventario/' + p).set(nuevoStock);

            // B. GUARDAR REGISTRO (LOG)
            db.ref('historial_ventas').push({
                fruta: p,
                cantidad: cant,
                fecha: fechaTexto
            });

            document.getElementById("cantidad").value = "";
        }
    </script>
</body>
</html>
