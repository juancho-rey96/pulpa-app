<!DOCTYPE html>
<html>
<head>
  <title>Pulpa App</title>

  <style>
  body {
    font-family: Arial;
    background: #eef2f7;
    margin: 0;
  }

  .container {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  ul {
    padding: 0;
  }

  li {
    list-style: none;
    background: #f1f1f1;
    margin-bottom: 8px;
    padding: 10px;
    border-radius: 5px;
  }
  </style>

</head>
</div>
<body>

    <div class="container"></div>

  <h2>Registro de Ventas 🥭</h2>

  <label>Producto:</label><br>
  <select id="producto">
    <option>Mora</option>
    <option>Mango</option>
    <option>Durazno</option>
    <option>Guayaba</option>
    <option>Lulo</option>
    <option>Fresa</option>
    <option>Tomate de Arbol</option>
  </select>

  <br><br>

  <label>Cantidad (lb):</label><br>
  <input type="number" id="cantidad">

  <br><br>

  <button onclick="guardar()" style="padding:10px;">Guardar</button>

  <h3 id="total"></h3>

  <h3>Historial de ventas</h3>
  <ul id="lista"></ul>

  <h3 id="totalGeneral"></h3>

  <script>
    let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

    mostrarVentas();

    function mostrarVentas() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let suma = 0;

  ventas.forEach(v => {
    let item = document.createElement("li");
    item.textContent =
      v.producto + " - " + v.cantidad + " lb - $" + v.total;
    lista.appendChild(item);

    suma += v.total;
  });

  document.getElementById("totalGeneral").innerText =
    "Total general: $" + suma;
}

    function guardar() {
      let producto = document.getElementById("producto").value;
      let cantidad = document.getElementById("cantidad").value;

      if (cantidad === "" || cantidad <= 0) {
        alert("Ingrese una cantidad válida");
        return;
      }

      let precio = 5000;
      let total = cantidad * precio;

      document.getElementById("total").innerText =
        "Total: $" + total;

      let venta = {
        producto: producto,
        cantidad: cantidad,
        total: total
      };

      ventas.push(venta);

      localStorage.setItem("ventas", JSON.stringify(ventas));

    mostrarVentas();

      let suma = 0;

ventas.forEach(v => {
  suma += v.total;
});

      document.getElementById("cantidad").value = "";
    }
  </script>

<body style="font-family: Arial; padding: 20px; background: #f5f5f5;">
</html>
