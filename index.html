<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpa App Pro 🥭</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #1557b0;
            --success: #28a745;
            --danger: #dc3545;
            --nequi: #E10098;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding: 20px 15px;
            background: url('https://img.freepik.com/vector-gratis/fondo-frutas-diseno-plano-dibujado-mano_23-2148961737.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #333;
        }

        .container { 
            max-width: 420px; 
            margin: 0 auto; 
            background: var(--glass-bg); 
            padding: 30px 25px; 
            border-radius: 24px; 
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }
        
        h2, h3, h4 { text-align: center; color: var(--primary); margin-top: 0; text-shadow: 0 2px 4px rgba(255,255,255,0.5); font-weight: 800; }
        
        .stock-info { background: rgba(255, 243, 205, 0.7); backdrop-filter: blur(5px); padding: 12px; border-radius: 12px; text-align: center; font-weight: 700; color: #856404; margin-bottom: 20px; border: 1px solid rgba(255, 238, 186, 0.8); }
        
        label { font-weight: 700; display: block; margin-top: 15px; color: #113f82; font-size: 14px; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.5); box-sizing: border-box; font-size: 16px; font-weight: 600; color: #333; outline: none; }
        input:focus, select:focus { background: rgba(255, 255, 255, 0.8); border-color: var(--primary); }
        
        .total-box { margin-top: 20px; padding: 20px; background: rgba(21, 87, 176, 0.15); border-radius: 16px; text-align: center; border: 1px solid rgba(21, 87, 176, 0.3); }
        .total-box span { display: block; font-size: 38px; font-weight: 900; color: var(--primary); margin-top: 5px; }

        .badge-nequi { background: var(--nequi); color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: bold; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; font-size: 18px; box-shadow: 0 4px 15px rgba(40,167,69,0.4); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-danger { background: rgba(220, 53, 69, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .btn-desplegable { background: rgba(21, 87, 176, 0.7); backdrop-filter: blur(5px); color: white; border: 1px solid rgba(255,255,255,0.2); }

        .seccion-oculta { display: none; margin-top: 15px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); }
        
        table { width: 100%; border-collapse: collapse; background: rgba(255, 255, 255, 0.8); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        table th { background: rgba(21, 87, 176, 0.8); color: white; padding: 12px; }
        table td { border-bottom: 1px solid rgba(0,0,0,0.1); padding: 12px; font-weight: 600; }
        .alerta-stock { color: var(--danger) !important; background-color: rgba(220, 53, 69, 0.1); }

        .log-item { background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; font-weight: 500; border-left: 4px solid var(--primary); }
        .pedido-item { border-left: 4px solid var(--nequi); }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; font-weight: bold; color: var(--primary); }
        .nav-bar span { cursor: pointer; text-decoration: underline; color: var(--danger); }

        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="navBar" class="nav-bar" style="display: none;">
            <div id="userEmailDisplay">usuario@correo.com</div>
            <span onclick="cerrarSesion()">Cerrar Sesión</span>
        </div>

        <div id="authContainer">
    <h2>Bienvenido 🥭</h2>
    <p style="text-align: center; font-weight: 600;">Inicia sesión para pedir o administrar</p>
    
    <label>Correo Electrónico:</label>
    <input type="email" id="emailAuth" placeholder="Ingresa tu email aquí" autocomplete="off">
    
    <label>Contraseña (Mínimo 6 caracteres):</label>
    <input type="password" id="passAuth" placeholder="******" autocomplete="new-password">
    
    <button class="btn-primary" onclick="iniciarSesion()">Ingresar</button>
    <button class="btn-outline" onclick="registrarUsuario()">Crear Cuenta Nueva</button>
</div>

        <div id="commonContainer" style="display: none;">
            <button class="btn-desplegable" onclick="toggleSeccion('inventarioSeccion')">👁️ Ver Disponible en Nevera</button>
            <div id="inventarioSeccion" class="seccion-oculta">
                <table id="tablaInventario"></table>
            </div>
            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 20px 0;">
        </div>

        <div id="clienteContainer" style="display: none;">
            <h2>Hacer un Pedido</h2>
            <div class="stock-info" id="avisoStockCliente">Revisando nevera...</div>

            <label>Quiero pedir:</label>
            <select id="productoCliente" onchange="actualizarVistaStock('Cliente')">
                <option value="Guanabana">Guanábana 🟢</option>
                <option value="Pera">Pera 🍐</option>
                <option value="Mora">Mora 🍇</option>
                <option value="Mango">Mango 🥭</option>
                <option value="Durazno">Durazno 🍑</option>
                <option value="Guayaba">Guayaba 🟡</option>
                <option value="Lulo">Lulo 🥝</option>
                <option value="Fresa">Fresa 🍓</option>
                <option value="Maracuya">Maracuyá 🍊</option>
                <option value="Tomate de Arbol">Tomate de árbol 🍅</option>
            </select>

            <label>Cantidad (Unidades):</label>
            <input type="number" id="cantidadCliente" placeholder="Ej: 2" step="1" oninput="calcularPrecioCliente()">

            <label>Dirección o Teléfono de Contacto:</label>
            <input type="text" id="contactoCliente" placeholder="Ej: Calle 123 / Cel: 300...">

            <div class="total-box">
                Total a Pagar
                <span id="displayTotalCliente">$ 0</span>
                <p style="font-size: 12px; color: #555;">Pago contra entrega o <span class="badge-nequi" style="font-size: 10px;">NEQUI</span></p>
            </div>

            <button class="btn-success" onclick="enviarPedido()">📲 ENVIAR PEDIDO</button>
        </div>

        <div id="adminContainer" style="display: none;">
            <h2 style="color: var(--nequi);">Panel de Control</h2>
            
            <div style="background: rgba(255,255,255,0.5); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border);">
                <h4 style="margin-top: 0;">Venta Presencial</h4>
                <select id="productoAdmin" onchange="actualizarVistaStock('Admin')">
                    <option value="Guanabana">Guanábana 🟢</option>
                    <option value="Pera">Pera 🍐</option>
                    <option value="Mora">Mora 🍇</option>
                    <option value="Mango">Mango 🥭</option>
                    <option value="Durazno">Durazno 🍑</option>
                    <option value="Guayaba">Guayaba 🟡</option>
                    <option value="Lulo">Lulo 🥝</option>
                    <option value="Fresa">Fresa 🍓</option>
                    <option value="Maracuya">Maracuyá 🍊</option>
                    <option value="Tomate de Arbol">Tomate de árbol 🍅</option>
                </select>
                <input type="number" id="cantidadAdmin" placeholder="Cantidad" step="0.1">
                <button class="btn-success" style="padding: 10px; font-size: 15px;" onclick="guardarVentaPOS()">✅ Vender (Pagado Nequi/Efectivo)</button>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 20px 0;">

            <h4>🛵 Pedidos de Clientes</h4>
            <div id="listaPedidos" style="max-height: 150px; overflow-y: auto; margin-bottom: 10px;"></div>

            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 20px 0;">

            <h4>📥 Cargar Mercancía</h4>
            <input type="number" id="cantidadNueva" placeholder="Unidades recibidas">
            <button class="btn-primary" onclick="sumarStock()">Sumar al Stock</button>

            <h4 style="margin-top: 20px;">💰 Cierre de Caja Diario</h4>
            <div id="listaHistorial" style="max-height: 150px; overflow-y: auto;"></div>
            <p id="resultadoCierre" style="font-size:28px; font-weight:900; color:var(--primary); text-align:center;">$ 0</p>
            <button class="btn-outline" style="background: white;" onclick="hacerCierreCaja()">Calcular Total</button>
            <button class="btn-danger" onclick="borrarHistorial()">⚠️ REINICIAR DÍA</button>
        </div>
    </div>

    <div id="toast">Notificación</div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAYJ15P0bWb35dY8sbNuC0_4xcYFsuaz7A",
            authDomain: "pulpaapp-3ec88.firebaseapp.com",
            databaseURL: "https://pulpaapp-3ec88-default-rtdb.firebaseio.com",
            projectId: "pulpaapp-3ec88",
            storageBucket: "pulpaapp-3ec88.firebasestorage.app",
            messagingSenderId: "1036704181260",
            appId: "1:1036704181260:web:1213390bb88350cad09229"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        
        let inventario = {};
        const PRECIO_UNIDAD = 5000;
        const formatoCOP = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 });

        // --- COLOCA AQUÍ TU CORREO DE ADMINISTRADOR ---
        const CORREO_ADMIN = "juanrodriguez110099@gmail.com"; 

        function mostrarToast(mensaje, colorFondo = "#333") {
            const toast = document.getElementById("toast");
            toast.innerText = mensaje; toast.style.backgroundColor = colorFondo; toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function toggleSeccion(id) {
            let s = document.getElementById(id);
            s.style.display = (s.style.display === "block") ? "none" : "block";
        }

        // ================= SISTEMA DE USUARIOS =================
        auth.onAuthStateChanged(user => {
            document.getElementById("authContainer").style.display = "none";
            document.getElementById("commonContainer").style.display = "none";
            document.getElementById("clienteContainer").style.display = "none";
            document.getElementById("adminContainer").style.display = "none";

            if (user) {
                document.getElementById("navBar").style.display = "flex";
                document.getElementById("userEmailDisplay").innerText = user.email;
                document.getElementById("commonContainer").style.display = "block"; // Muestra la tabla de nevera a todos
                
                if(user.email.toLowerCase() === CORREO_ADMIN.toLowerCase()) {
                    document.getElementById("adminContainer").style.display = "block";
                    cargarDatosAdmin();
                    actualizarVistaStock('Admin');
                } else {
                    document.getElementById("clienteContainer").style.display = "block";
                    actualizarVistaStock('Cliente');
                }
            } else {
                document.getElementById("navBar").style.display = "none";
                document.getElementById("authContainer").style.display = "block";
            }
        });

        // REPARADO: Se agregó validación de contraseña de 6 caracteres
        function registrarUsuario() {
            let email = document.getElementById("emailAuth").value;
            let pass = document.getElementById("passAuth").value;

            if(!email.includes("@")) {
                mostrarToast("❌ Por favor ingresa un correo válido", "#dc3545");
                return;
            }
            if(pass.length < 6) {
                mostrarToast("❌ La contraseña debe tener MÍNIMO 6 caracteres", "#dc3545");
                return;
            }

            auth.createUserWithEmailAndPassword(email, pass)
                .then(() => mostrarToast("✅ Cuenta creada con éxito", "#28a745"))
                .catch(err => {
                    if(err.code === 'auth/email-already-in-use') {
                        mostrarToast("❌ Ese correo ya está registrado", "#dc3545");
                    } else {
                        mostrarToast("❌ Error: " + err.message, "#dc3545");
                    }
                });
        }

        function iniciarSesion() {
            let email = document.getElementById("emailAuth").value;
            let pass = document.getElementById("passAuth").value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => mostrarToast("🔓 Sesión iniciada", "#1557b0"))
                .catch(err => mostrarToast("❌ Error: Verifica tus datos", "#dc3545"));
        }

        function cerrarSesion() { auth.signOut(); }

        // ================= INVENTARIO GLOBAL =================
        db.ref('inventario').on('value', (s) => { 
            inventario = s.val() || {}; 
            if(auth.currentUser) {
                if(auth.currentUser.email.toLowerCase() === CORREO_ADMIN.toLowerCase()){
                    actualizarVistaStock('Admin');
                } else {
                    actualizarVistaStock('Cliente');
                }
            }
            dibujarTabla(); // REPARADO: Volví a colocar la función para pintar la tabla
        });

        function actualizarVistaStock(vista) {
            let selectId = vista === 'Cliente' ? 'productoCliente' : 'productoAdmin';
            let avisoId = vista === 'Cliente' ? 'avisoStockCliente' : null;
            
            let el = document.getElementById(selectId);
            if(!el) return;
            let p = el.value;
            let stock = inventario[p] || 0;
            
            if(avisoId) {
                let aviso = document.getElementById(avisoId);
                aviso.innerText = `Disponible: ${stock} unidades de ${p}`;
                if(stock <= 2) { aviso.style.backgroundColor = "rgba(220, 53, 69, 0.8)"; aviso.style.color = "white"; } 
                else { aviso.style.backgroundColor = "rgba(255, 243, 205, 0.7)"; aviso.style.color = "#856404"; }
            }
        }

        // REPARADO: Función reconstruida para pintar las frutas en la tabla
        function dibujarTabla() {
            let tabla = document.getElementById("tablaInventario");
            if (!tabla) return;
            tabla.innerHTML = "<tr><th>Sabor de Pulpa</th><th>Stock Actual</th></tr>";
            for (let f in inventario) {
                let s = inventario[f];
                let c = (s <= 2) ? 'class="alerta-stock"' : '';
                tabla.innerHTML += `<tr><td>${f}</td><td ${c}>${s} und</td></tr>`;
            }
        }

        // ================= LÓGICA DEL CLIENTE =================
        function calcularPrecioCliente() {
            let cant = parseFloat(document.getElementById("cantidadCliente").value) || 0;
            document.getElementById("displayTotalCliente").innerText = formatoCOP.format(cant * PRECIO_UNIDAD);
        }

        function enviarPedido() {
            let p = document.getElementById("productoCliente").value;
            let cant = parseFloat(document.getElementById("cantidadCliente").value);
            let contacto = document.getElementById("contactoCliente").value;
            
            if (isNaN(cant) || cant <= 0 || contacto.trim() === "") { 
                mostrarToast("⚠️ Llena cantidad y contacto", "#dc3545"); return; 
            }
            if (cant > (inventario[p] || 0)) {
                mostrarToast(`❌ Solo hay ${inventario[p] || 0} und en nevera`, "#dc3545"); return;
            }

            db.ref('inventario/' + p).set(Math.round((inventario[p] - cant)*100)/100);
            db.ref('pedidos_pendientes').push({ 
                cliente: auth.currentUser.email,
                contacto: contacto,
                fruta: p, 
                cantidad: cant, 
                total: cant * PRECIO_UNIDAD, 
                fecha: new Date().toLocaleString() 
            });
            
            document.getElementById("cantidadCliente").value = "";
            document.getElementById("contactoCliente").value = "";
            document.getElementById("displayTotalCliente").innerText = "$ 0";
            mostrarToast("✅ Pedido enviado. Pronto te contactaremos.", "#28a745");
        }

        // ================= LÓGICA DEL ADMINISTRADOR =================
        function cargarDatosAdmin() {
            db.ref('historial_ventas').limitToLast(10).on('value', (s) => {
                const data = s.val(); const cont = document.getElementById("listaHistorial"); cont.innerHTML = "";
                if (data) { Object.values(data).reverse().forEach(v => {
                    cont.innerHTML += `<div class="log-item">🥭 ${v.fruta}: ${v.cantidad}u - <strong>${formatoCOP.format(v.total)}</strong></div>`;
                });}
            });

            db.ref('pedidos_pendientes').on('value', (s) => {
                const data = s.val(); const cont = document.getElementById("listaPedidos"); cont.innerHTML = "";
                if (data) { Object.entries(data).reverse().forEach(([key, v]) => {
                    cont.innerHTML += `<div class="log-item pedido-item">
                        <strong>📦 ${v.fruta} x${v.cantidad}</strong><br>
                        <small>De: ${v.contacto}</small><br>
                        <button onclick="completarPedido('${key}', '${v.fruta}', ${v.cantidad}, ${v.total})" style="margin-top:5px; padding:5px; background:var(--success); color:white; border:none; border-radius:5px; width:100%;">Marcar Entregado y Cobrar</button>
                    </div>`;
                });}
            });
        }

        function guardarVentaPOS() {
            let p = document.getElementById("productoAdmin").value;
            let cant = parseFloat(document.getElementById("cantidadAdmin").value);
            if (isNaN(cant) || cant <= 0 || cant > (inventario[p] || 0)) { mostrarToast("❌ Verifica la cantidad disponible", "#dc3545"); return; }
            
            db.ref('inventario/' + p).set(Math.round((inventario[p] - cant)*100)/100);
            db.ref('historial_ventas').push({ fruta: p, cantidad: cant, total: cant * PRECIO_UNIDAD, fecha: new Date().toLocaleString(), tipo: 'Presencial' });
            document.getElementById("cantidadAdmin").value = "";
            mostrarToast("✅ Venta registrada", "#28a745");
        }

        function sumarStock() {
            let p = document.getElementById("productoAdmin").value;
            let cant = parseFloat(document.getElementById("cantidadNueva").value);
            if(isNaN(cant) || cant <= 0) return;
            db.ref('inventario/' + p).set(Math.round(((inventario[p] || 0) + cant)*100)/100);
            document.getElementById("cantidadNueva").value = "";
            mostrarToast(`📥 Ingresado al inventario`, "#28a745");
        }

        function hacerCierreCaja() {
            db.ref('historial_ventas').once('value', (s) => {
                let total = 0; if(s.val()) Object.values(s.val()).forEach(v => total += v.total);
                document.getElementById("resultadoCierre").innerText = formatoCOP.format(total);
            });
        }

        function completarPedido(key, fruta, cant, total) {
            db.ref('historial_ventas').push({ fruta: fruta, cantidad: cant, total: total, fecha: new Date().toLocaleString(), tipo: 'Pedido Online' });
            db.ref('pedidos_pendientes/' + key).remove();
            mostrarToast("✅ Pedido completado y sumado a caja", "#1557b0");
        }

        function borrarHistorial() {
            if(confirm("¿Seguro de borrar todas las ventas de hoy?")) { 
                db.ref('historial_ventas').remove(); 
                document.getElementById("resultadoCierre").innerText = "$ 0";
            }
        }
    </script>
</body>
</html>
