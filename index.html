<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpa App Pro 🥭</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 15px;
            /* FONDO DE FRUTAS QUE CUBRE TODO */
            background: url('https://img.freepik.com/vector-gratis/fondo-frutas-diseno-plano-dibujado-mano_23-2148961737.jpg') no-repeat center center fixed; 
            background-size: cover;
        }

        .container { 
            max-width: 420px; 
            margin: 40px auto; 
            background: rgba(255, 255, 255, 0.96); 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        
        .stock-info { background: #fff3cd; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; color: #856404; margin-bottom: 20px; border: 1px solid #ffeeba; }
        
        label { font-weight: 600; display: block; margin-top: 15px; color: #333; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        
        .total-box { margin-top: 15px; padding: 15px; background: #e8f0fe; border-radius: 10px; text-align: center; border: 1px solid #1a73e8; }
        .total-box span { font-size: 28px; font-weight: bold; color: #1a73e8; }

        .btn-guardar { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* SECCIÓN PAGOS */
        .seccion-pagos { margin-top: 20px; padding: 15px; background: #f1f3f4; border-radius: 15px; }
        .grid-pagos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-banco { padding: 10px 5px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; text-align: center; }
        
        .nequi { background: #ff0072; }
        .bancolombia { background: #00448d; }
        .brebe { background: #6f42c1; }

        .btn-toggle { width: 100%; padding: 12px; background: #5f6368; color: white; border: none; border-radius: 10px; margin-top: 25px; cursor: pointer; font-weight: bold; }

        #seccionPrivada { display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        table th, table td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .alerta-stock { color: #dc3545 !important; font-weight: bold; background-color: #ffeef0; }
        
        .log-item { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #28a745; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Venta de Pulpa 🥭</h2>
        
        <div class="stock-info" id="avisoStock">Cargando stock...</div>

        <label>Producto:</label>
        <select id="producto" onchange="actualizarVistaStock()">
            <option value="Mora">Mora 🍇</option>
            <option value="Pera">Pera 🍐</option>
            <option value="Mango">Mango 🥭</option>
            <option value="Durazno">Durazno 🍑</option>
            <option value="Guayaba">Guayaba 🟡</option>
            <option value="Lulo">Lulo 🍈</option>
            <option value="Fresa">Fresa 🍓</option>
            <option value="Tomate de Árbol">Tomate de Árbol 🍅</option>
        </select>

        <label>Cantidad (lb):</label>
        <input type="number" id="cantidad" placeholder="0.0" step="0.1" oninput="calcularPrecio()">

        <div class="total-box">
            Total Cobrar:<br>
            <span id="displayTotal">$ 0</span>
        </div>

        <button class="btn-guardar" onclick="guardarVenta()">✅ REGISTRAR VENTA</button>

        <div class="seccion-pagos">
            <h4 style="margin:0; text-align:center; font-size: 14px;">Transferir por:</h4>
            <div class="grid-pagos">
                <button class="btn-banco nequi" onclick="copiarYRedirigir('3114413297', 'Nequi')">NEQUI</button>
                <button class="btn-banco bancolombia" onclick="copiarYRedirigir('000000000', 'Bancolombia')">BANCOLO</button>
                <button class="btn-banco brebe" onclick="copiarYRedirigir('3114413297', 'Bre-B')">BRE-B</button>
            </div>
        </div>

        <button class="btn-toggle" onclick="abrirInventarioSeguro()">🔐 Inventario / Caja</button>

        <div id="seccionPrivada">
            <h3>Inventario en Nevera</h3>
            <table id="tablaInventario"></table>

            <div style="background:#eefaf0; padding:15px; border-radius:15px; margin-top:20px; border:1px solid #28a745;">
                <h4 style="margin:0 0 10px 0; color:#28a745;">Cargar Mercancía</h4>
                <input type="number" id="cantidadNueva" placeholder="Lbs que llegaron">
                <button onclick="sumarStock()" style="width:100%; background:#28a745; color:white; border:none; padding:12px; border-radius:8px; margin-top:10px; font-weight:bold;">Sumar Stock</button>
            </div>

            <h4 style="margin-top:20px;">Ventas de Hoy</h4>
            <div id="listaHistorial"></div>

            <div style="background:#e8f0fe; border:2px dashed #1a73e8; padding:15px; border-radius:15px; text-align:center; margin-top:20px;">
                <h4>Cierre de Caja</h4>
                <p id="resultadoCierre" style="font-size:24px; font-weight:bold; color:#1a73e8;">$ 0</p>
                <button onclick="hacerCierreCaja()" style="width:100%; background:#1a73e8; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;">Calcular Ventas</button>
                <button onclick="borrarHistorial()" style="margin-top:15px; background:none; border:none; color:red; cursor:pointer; font-size:11px;">REINICIAR DÍA</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYJ15P0bWb35dY8sbNuC0_4xcYFsuaz7A",
            authDomain: "pulpaapp-3ec88.firebaseapp.com",
            databaseURL: "https://pulpaapp-3ec88-default-rtdb.firebaseio.com",
            projectId: "pulpaapp-3ec88",
            storageBucket: "pulpaapp-3ec88.firebasestorage.app",
            messagingSenderId: "1036704181260",
            appId: "1:1036704181260:web:1213390bb88350cad09229"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let inventario = {};
        const PRECIO_UNIDAD = 5000;

        db.ref('inventario').on('value', (s) => { inventario = s.val() || {}; actualizarVistaStock(); dibujarTabla(); });

        db.ref('historial_ventas').limitToLast(10).on('value', (s) => {
            const data = s.val();
            const cont = document.getElementById("listaHistorial");
            cont.innerHTML = "";
            if (data) {
                Object.values(data).reverse().forEach(v => {
                    cont.innerHTML += `<div class="log-item"><b>${v.fruta}</b>: ${v.cantidad} lb - $${v.total.toLocaleString()}</div>`;
                });
            }
        });

        function calcularPrecio() {
            let cant = parseFloat(document.getElementById("cantidad").value) || 0;
            document.getElementById("displayTotal").innerText = "$ " + (cant * PRECIO_UNIDAD).toLocaleString();
        }

        function actualizarVistaStock() {
            let p = document.getElementById("producto").value;
            let stock = inventario[p] || 0;
            document.getElementById("avisoStock").innerText = "Stock: " + stock + " lb de " + p;
        }

        function dibujarTabla() {
            let tabla = document.getElementById("tablaInventario");
            tabla.innerHTML = "<tr><th>Fruta</th><th>Stock</th></tr>";
            for (let f in inventario) {
                let s = inventario[f];
                let c = (s < 2) ? 'class="alerta-stock"' : '';
                tabla.innerHTML += `<tr><td>${f}</td><td ${c}>${s} lb</td></tr>`;
            }
        }

        function guardarVenta() {
            let p = document.getElementById("producto").value;
            let cant = parseFloat(document.getElementById("cantidad").value);
            if (isNaN(cant) || cant <= 0 || cant > (inventario[p] || 0)) { alert("Verifica la cantidad"); return; }
            
            let total = cant * PRECIO_UNIDAD;
            db.ref('inventario/' + p).set(Math.round((inventario[p] - cant)*100)/100);
            db.ref('historial_ventas').push({ fruta: p, cantidad: cant, total: total, fecha: new Date().toLocaleString() });
            
            document.getElementById("cantidad").value = "";
            document.getElementById("displayTotal").innerText = "$ 0";
            alert("Venta registrada ✅");
        }

        function copiarYRedirigir(numero, banco) {
            let input = document.createElement("input");
            input.value = numero;
            document.body.appendChild(input);
            input.select();
            document.execCommand("copy");
            document.body.removeChild(input);
            
            alert(banco + ": Número " + numero + " copiado.");
            if(banco === 'Nequi') window.location.href = "nequi://";
        }

        function abrirInventarioSeguro() {
            let pass = prompt("Introduce la clave para acceder:");
            if (pass === "1996") {
                let s = document.getElementById("seccionPrivada");
                s.style.display = (s.style.display === "block") ? "none" : "block";
            } else {
                alert("Clave incorrecta ❌");
            }
        }

        function sumarStock() {
            let p = document.getElementById("producto").value;
            let cant = parseFloat(document.getElementById("cantidadNueva").value);
            if(isNaN(cant) || cant <= 0) return;
            db.ref('inventario/' + p).set(Math.round(((inventario[p] || 0) + cant)*100)/100);
            document.getElementById("cantidadNueva").value = "";
            alert("Stock actualizado 📥");
        }

        function hacerCierreCaja() {
            db.ref('historial_ventas').once('value', (s) => {
                let total = 0;
                if(s.val()) Object.values(s.val()).forEach(v => total += v.total);
                document.getElementById("resultadoCierre").innerText = "$ " + total.toLocaleString();
            });
        }

        function borrarHistorial() {
            if(confirm("¿Seguro que quieres borrar todo el historial del día?")) {
                db.ref('historial_ventas').remove();
                alert("Historial limpio.");
                location.reload();
            }
        }
    </script>
</body>
</html>
