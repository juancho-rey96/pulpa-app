<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpa App Pro 🥭</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 15px;
            /* FONDO DE FRUTAS */
            background: url('https://img.freepik.com/vector-gratis/fondo-frutas-diseno-plano-dibujado-mano_23-2148961737.jpg') no-repeat center center fixed; 
            background-size: cover;
        }

        .container { 
            max-width: 420px; 
            margin: 10px auto; 
            /* EFECTO TRANSPARENTE (CRISTAL) */
            background: rgba(255, 255, 255, 0.85); 
            padding: 25px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px); /* Desenfoque del fondo */
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        h2, h3 { text-align: center; color: #1557b0; margin-top: 0; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        
        .stock-info { background: rgba(255, 243, 205, 0.9); padding: 12px; border-radius: 15px; text-align: center; font-weight: bold; color: #856404; margin-bottom: 20px; border: 1px solid #ffeeba; }
        
        label { font-weight: 700; display: block; margin-top: 15px; color: #1557b0; }
        
        /* INPUTS TRANSPARENTES */
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border-radius: 12px; 
            border: 1px solid rgba(0,0,0,0.1); 
            background: rgba(255, 255, 255, 0.7);
            box-sizing: border-box; 
            font-size: 16px; 
            font-weight: 500;
        }
        
        .total-box { 
            margin-top: 15px; 
            padding: 15px; 
            background: rgba(25, 118, 210, 0.1); 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid #1a73e8; 
        }
        .total-box span { font-size: 32px; font-weight: bold; color: #1a73e8; }

        .btn-guardar { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(40,167,69,0.3); }

        /* BOTONES DESPLEGABLES */
        .btn-desplegable { width: 100%; padding: 12px; background: rgba(21, 87, 176, 0.8); color: white; border: none; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .btn-admin { width: 100%; padding: 12px; background: rgba(95, 99, 104, 0.8); color: white; border: none; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 13px; }

        .seccion-oculta { display: none; margin-top: 15px; background: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 15px; }

        table { width: 100%; border-collapse: collapse; background: rgba(255, 255, 255, 0.9); border-radius: 10px; overflow: hidden; }
        table th, table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .alerta-stock { color: #dc3545 !important; font-weight: bold; background-color: #ffeef0; }

        .log-item { background: white; padding: 8px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid #28a745; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registro de Venta</h2>
        
        <div class="stock-info" id="avisoStock">Conectando...</div>

        <label>Fruta:</label>
        <select id="producto" onchange="actualizarVistaStock()">
            <option value="Guanabana">Guanabana 🫒</option>
            <option value="Pera">Mora 🍇</option>
            <option value="Mora">Pera 🍐</option>
            <option value="Mango">Mango 🥭</option>
            <option value="Durazno">Durazno 🍑</option>
            <option value="Guayaba">Guayaba 🟡</option>
            <option value="Lulo">Lulo 🍈</option>
            <option value="Fresa">Fresa 🍓</option>
            <option value="Maracuya">Maracuya 🍊</option>
            <option value="Tomate de Árbol">Tomate de Árbol 🍅</option>
        </select>

        <label>Peso en Libras:</label>
        <input type="number" id="cantidad" placeholder="0.0" step="0.1" oninput="calcularPrecio()">

        <div class="total-box">
            Total a Cobrar:<br>
            <span id="displayTotal">$ 0</span>
        </div>

        <button class="btn-guardar" onclick="guardarVenta()">✅ REGISTRAR</button>

        <button class="btn-desplegable" onclick="toggleSeccion('inventarioSeccion')">📂 Disponible en Nevera</button>
        <div id="inventarioSeccion" class="seccion-oculta">
            <table id="tablaInventario"></table>
        </div>

        <button class="btn-admin" onclick="accesoAdmin()">⚙️ Panel de Administración</button>

        <div id="panelAdmin" class="seccion-oculta">
            <h4 style="margin:0 0 10px 0;">📥 Cargar Mercancía</h4>
            <input type="number" id="cantidadNueva" placeholder="Lbs recibidas">
            <button onclick="sumarStock()" style="width:100%; background:#28a745; color:white; border:none; padding:10px; border-radius:8px; margin-top:8px; font-weight:bold;">Sumar al Stock</button>

            <h4 style="margin:20px 0 10px 0;">💰 Cierre de Caja</h4>
            <div id="listaHistorial"></div>
            <p id="resultadoCierre" style="font-size:24px; font-weight:bold; color:#1a73e8; text-align:center;">$ 0</p>
            <button onclick="hacerCierreCaja()" style="width:100%; background:#1a73e8; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">Calcular Total</button>
            <button onclick="borrarHistorial()" style="margin-top:20px; width:100%; background:none; border:none; color:red; cursor:pointer; font-size:11px; font-weight:bold;">REINICIAR DÍA</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYJ15P0bWb35dY8sbNuC0_4xcYFsuaz7A",
            authDomain: "pulpaapp-3ec88.firebaseapp.com",
            databaseURL: "https://pulpaapp-3ec88-default-rtdb.firebaseio.com",
            projectId: "pulpaapp-3ec88",
            storageBucket: "pulpaapp-3ec88.firebasestorage.app",
            messagingSenderId: "1036704181260",
            appId: "1:1036704181260:web:1213390bb88350cad09229"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let inventario = {};
        const PRECIO_UNIDAD = 5000;

        db.ref('inventario').on('value', (s) => { inventario = s.val() || {}; actualizarVistaStock(); dibujarTabla(); });

        db.ref('historial_ventas').limitToLast(5).on('value', (s) => {
            const data = s.val();
            const cont = document.getElementById("listaHistorial");
            cont.innerHTML = "";
            if (data) {
                Object.values(data).reverse().forEach(v => {
                    cont.innerHTML += `<div class="log-item">${v.fruta}: ${v.cantidad}lb - $${v.total.toLocaleString()}</div>`;
                });
            }
        });

        function calcularPrecio() {
            let cant = parseFloat(document.getElementById("cantidad").value) || 0;
            document.getElementById("displayTotal").innerText = "$ " + (cant * PRECIO_UNIDAD).toLocaleString();
        }

        function actualizarVistaStock() {
            let p = document.getElementById("producto").value;
            let stock = inventario[p] || 0;
            document.getElementById("avisoStock").innerText = "Hay " + stock + " lb de " + p;
        }

        function dibujarTabla() {
            let tabla = document.getElementById("tablaInventario");
            tabla.innerHTML = "<tr><th>Fruta</th><th>Stock</th></tr>";
            for (let f in inventario) {
                let s = inventario[f];
                let c = (s < 2) ? 'class="alerta-stock"' : '';
                tabla.innerHTML += `<tr><td>${f}</td><td ${c}>${s} lb</td></tr>`;
            }
        }

        function guardarVenta() {
            let p = document.getElementById("producto").value;
            let cant = parseFloat(document.getElementById("cantidad").value);
            if (isNaN(cant) || cant <= 0 || cant > (inventario[p] || 0)) { alert("Verifica cantidad"); return; }
            db.ref('inventario/' + p).set(Math.round((inventario[p] - cant)*100)/100);
            db.ref('historial_ventas').push({ fruta: p, cantidad: cant, total: cant * PRECIO_UNIDAD, fecha: new Date().toLocaleString() });
            document.getElementById("cantidad").value = "";
            document.getElementById("displayTotal").innerText = "$ 0";
            alert("Venta guardada ✅");
        }


        function toggleSeccion(id) {
            let s = document.getElementById(id);
            s.style.display = (s.style.display === "block") ? "none" : "block";
        }

        function accesoAdmin() {
            let pass = prompt("Clave:");
            if (pass === "1996") {
                toggleSeccion('panelAdmin');
            } else {
                alert("Clave incorrecta ❌");
            }
        }

        function sumarStock() {
            let p = document.getElementById("producto").value;
            let cant = parseFloat(document.getElementById("cantidadNueva").value);
            if(isNaN(cant) || cant <= 0) return;
            db.ref('inventario/' + p).set(Math.round(((inventario[p] || 0) + cant)*100)/100);
            document.getElementById("cantidadNueva").value = "";
            alert("Stock actualizado 📥");
        }

        function hacerCierreCaja() {
            db.ref('historial_ventas').once('value', (s) => {
                let total = 0;
                if(s.val()) Object.values(s.val()).forEach(v => total += v.total);
                document.getElementById("resultadoCierre").innerText = "$ " + total.toLocaleString();
            });
        }

        function borrarHistorial() {
            if(confirm("¿Borrar historial de hoy?")) {
                db.ref('historial_ventas').remove();
                location.reload();
            }
        }
    </script>
</body>
</html>
