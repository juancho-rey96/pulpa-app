<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpa App Pro 🥭</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 15px;
            /* FONDO CON PATRÓN DE FRUTAS */
            background-color: #f0f2f5;
            background-image: url('https://www.transparenttextures.com/patterns/pina-colada.png'); 
            background-attachment: fixed;
        }

        .container { 
            max-width: 420px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.95); /* Fondo blanco semi-transparente */
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }
        
        h2, h3, h4 { text-align: center; color: #1a73e8; margin-top: 5px; }
        
        .foto-contenedor { text-align: center; margin-bottom: 15px; }
        #fotoFruta { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid #1a73e8; }

        .stock-info { background: #fff3cd; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; color: #856404; margin-bottom: 20px; border: 1px solid #ffeeba; }
        
        label { font-weight: 600; display: block; margin-top: 15px; color: #333; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        
        .total-box { margin-top: 15px; padding: 15px; background: #e8f0fe; border-radius: 10px; text-align: center; border: 1px solid #1a73e8; }
        .total-box span { font-size: 28px; font-weight: bold; color: #1a73e8; }

        .btn-guardar { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-guardar:active { transform: scale(0.98); }

        /* SECCIÓN MULTIBANCOS */
        .seccion-pagos { margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 15px; border: 1px solid #ddd; }
        .btn-banco { width: 100%; padding: 12px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .nequi { background: #ff0072; }
        .bancolombia { background: #fdc830; color: black; }
        .brebe { background: #6f42c1; }

        .btn-toggle { width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        table th, table td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .alerta-stock { color: #dc3545 !important; font-weight: bold; background-color: #ffeef0; }
        
        .log-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #28a745; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #seccionTablas { display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Venta de Pulpa 🥭</h2>
        
        <div class="foto-contenedor">
            <img id="fotoFruta" src="https://cdn-icons-png.flaticon.com/512/1625/1625099.png">
        </div>

        <div class="stock-info" id="avisoStock">Conectando...</div>

        <label>Fruta Seleccionada:</label>
        <select id="producto" onchange="actualizarVistaStock()">
            <option value="Mora">Mora 🍇</option>
            <option value="Pera">Pera 🍐</option>
            <option value="Mango">Mango 🥭</option>
            <option value="Durazno">Durazno 🍑</option>
            <option value="Guayaba">Guayaba 🟡</option>
            <option value="Lulo">Lulo 🍈</option>
            <option value="Fresa">Fresa 🍓</option>
            <option value="Tomate de Árbol">Tomate de Árbol 🍅</option>
        </select>

        <label>Cantidad a vender (lb):</label>
        <input type="number" id="cantidad" placeholder="0.0" step="0.1" oninput="calcularPrecio()">

        <div class="total-box">
            Total Cobrar:<br>
            <span id="displayTotal">$ 0</span>
        </div>

        <button class="btn-guardar" onclick="guardarVenta()">✅ Registrar Venta</button>

        <div class="seccion-pagos">
            <h4 style="margin:0">💳 Transferir por:</h4>
            <button class="btn-banco nequi" onclick="pagar('3114413297', 'Nequi')">Nequi</button>
            <button class="btn-banco bancolombia" onclick="pagar('123456789', 'Bancolombia')">Bancolombia</button>
            <button class="btn-banco brebe" onclick="pagar('3114413297', 'Brebe')">Brebe</button>
        </div>

        <button class="btn-toggle" onclick="toggleSeccion()">📋 Inventario / Caja</button>

        <div id="seccionTablas">
            <h3>Inventario en Nevera</h3>
            <table id="tablaInventario"></table>

            <div style="background:#eefaf0; padding:15px; border-radius:10px; margin-top:15px; border:1px solid #28a745;">
                <h4>📥 Cargar Mercancía</h4>
                <input type="number" id="cantidadNueva" placeholder="Libras que llegaron">
                <button onclick="sumarStock()" style="width:100%; background:#28a745; color:white; border:none; padding:10px; border-radius:8px; margin-top:5px; font-weight:bold;">Sumar</button>
            </div>

            <div id="listaHistorial" style="margin-top:15px;"></div>

            <div style="background:#fff; border:2px dashed #1a73e8; padding:15px; border-radius:10px; text-align:center; margin-top:15px;">
                <h4>💰 Total del Día</h4>
                <p id="resultadoCierre" style="font-size:24px; font-weight:bold; color:#1a73e8;">$ 0</p>
                <button onclick="hacerCierreCaja()" style="width:100%; background:#1a73e8; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">Cerrar Caja</button>
                <button onclick="borrarHistorial()" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer; font-size:12px;">Limpiar datos del día</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYJ15P0bWb35dY8sbNuC0_4xcYFsuaz7A",
            authDomain: "pulpaapp-3ec88.firebaseapp.com",
            databaseURL: "https://pulpaapp-3ec88-default-rtdb.firebaseio.com",
            projectId: "pulpaapp-3ec88",
            storageBucket: "pulpaapp-3ec88.firebasestorage.app",
            messagingSenderId: "1036704181260",
            appId: "1:1036704181260:web:1213390bb88350cad09229"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let inventario = {};
        const PRECIO_UNIDAD = 5000;

        const fotos = {
            "Mora": "https://img.freepik.com/foto-gratis/moras-frescas-sobre-fondo-blanco_144627-14734.jpg",
            "Pera": "https://img.freepik.com/foto-gratis/pera-fresca-aislado_144627-14371.jpg",
            "Mango": "https://img.freepik.com/foto-gratis/mango-fresco-aislado_144627-14373.jpg",
            "Durazno": "https://img.freepik.com/foto-gratis/durazno-fresco-aislado_144627-14375.jpg",
            "Guayaba": "https://img.freepik.com/foto-gratis/guayaba-fresca-aislada_144627-14377.jpg",
            "Lulo": "https://img.freepik.com/premium-photo/close-up-lulo-fruit-isolated-white-background_253984-7541.jpg",
            "Fresa": "https://img.freepik.com/foto-gratis/fresa-fresca-aislada_144627-14381.jpg",
            "Tomate de Árbol": "https://jumbocolombiaio.vtexassets.com/arquivos/ids/205697/7709848520261.jpg"
        };

        db.ref('inventario').on('value', (s) => { inventario = s.val() || {}; actualizarVistaStock(); dibujarTabla(); });

        db.ref('historial_ventas').limitToLast(5).on('value', (s) => {
            const data = s.val();
            const cont = document.getElementById("listaHistorial");
            cont.innerHTML = "<h4>Últimas ventas:</h4>";
            if (data) {
                Object.values(data).reverse().forEach(v => {
                    cont.innerHTML += `<div class="log-item"><b>${v.fruta}</b>: ${v.cantidad} lb - $${v.total.toLocaleString()}</div>`;
                });
            }
        });

        function calcularPrecio() {
            let cant = parseFloat(document.getElementById("cantidad").value) || 0;
            document.getElementById("displayTotal").innerText = "$ " + (cant * PRECIO_UNIDAD).toLocaleString();
        }

        function actualizarVistaStock() {
            let p = document.getElementById("producto").value;
            let stock = inventario[p] || 0;
            document.getElementById("avisoStock").innerText = "Stock: " + stock + " lb de " + p;
            document.getElementById("fotoFruta").src = fotos[p] || "";
        }

        function dibujarTabla() {
            let tabla = document.getElementById("tablaInventario");
            tabla.innerHTML = "<tr><th>Fruta</th><th>Stock</th></tr>";
            for (let f in inventario) {
                let s = inventario[f];
                let c = (s < 2) ? 'class="alerta-stock"' : '';
                tabla.innerHTML += `<tr><td>${f}</td><td ${c}>${s} lb</td></tr>`;
            }
        }

        function guardarVenta() {
            let p = document.getElementById("producto").value;
            let cant = parseFloat(document.getElementById("cantidad").value);
            if (isNaN(cant) || cant <= 0 || cant > (inventario[p] || 0)) { alert("Error en cantidad"); return; }
            
            let total = cant * PRECIO_UNIDAD;
            db.ref('inventario/' + p).set(Math.round((inventario[p] - cant)*100)/100);
            db.ref('historial_ventas').push({ fruta: p, cantidad: cant, total: total, fecha: new Date().toLocaleString() });
            
            document.getElementById("cantidad").value = "";
            document.getElementById("displayTotal").innerText = "$ 0";
            alert("Venta registrada ✅");
        }

        function pagar(numero, banco) {
            let total = document.getElementById("displayTotal").innerText;
            navigator.clipboard.writeText(numero).then(() => {
                alert(banco + ": Número " + numero + " copiado.\nTotal: " + total);
                if(banco === 'Nequi') window.location.href = "nequi://";
            });
        }

        function sumarStock() {
            let p = document.getElementById("producto").value;
            let cant = parseFloat(document.getElementById("cantidadNueva").value);
            if(isNaN(cant) || cant <= 0) return;
            db.ref('inventario/' + p).set(Math.round(((inventario[p] || 0) + cant)*100)/100);
            document.getElementById("cantidadNueva").value = "";
            alert("Inventario cargado 📥");
        }

        function hacerCierreCaja() {
            db.ref('historial_ventas').once('value', (s) => {
                let total = 0;
                if(s.val()) Object.values(s.val()).forEach(v => total += v.total);
                document.getElementById("resultadoCierre").innerText = "$ " + total.toLocaleString();
            });
        }

        function borrarHistorial() {
            if(confirm("¿Borrar todo el día?")) { db.ref('historial_ventas').remove(); location.reload(); }
        }

        function toggleSeccion() {
            let s = document.getElementById("seccionTablas");
            s.style.display = (s.style.display === "none") ? "block" : "none";
        }
    </script>
</body>
</html>
