<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pulpa App - Inventario</title>
  <style>
    body { font-family: Arial, sans-serif; background: #eef2f7; margin: 0; padding: 20px; }
    .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2, h3 { text-align: center; color: #333; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    
    .btn-guardar { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; }
    .btn-historial { width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    
    .stock-info { background: #fff3cd; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; font-weight: bold; color: #856404; }
    
    #seccionHistorial { display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px; }
    ul { padding: 0; }
    li { list-style: none; background: #f8f9fa; margin-bottom: 5px; padding: 10px; border-radius: 5px; border-left: 4px solid #28a745; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    table td, table th { border: 1px solid #ddd; padding: 8px; text-align: left; }
    table th { background-color: #f2f2f2; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Registro de Fruta</h2>

    <div class="stock-info" id="avisoStock">Selecciona un producto</div>

    <label>Producto:</label>
    <select id="producto" onchange="actualizarVistaStock()">
      <option value="Mora">Mora🍇</option>
      <option value="Pera">Pera🍐</option>
      <option value="Mango">Mango🥭</option>
      <option value="Durazno">Durazno🍑</option>
      <option value="Guayaba">Guayaba🟡</option>
      <option value="Lulo">Lulo🍈</option>
      <option value="Fresa">Fresa🍓</option>
      <option value="Tomate de Árbol">Tomate de Árbol🍅</option>
    </select>

    <label>Cantidad a vender (lb):</label>
    <input type="number" id="cantidad" placeholder="¿Cuántas libras?">

    <button class="btn-guardar" onclick="guardar()">Registrar Venta</button>
    
    <div id="totalReciente" style="text-align:center; margin-top:10px; color:green; font-weight:bold;"></div>

    <button class="btn-historial" onclick="toggleHistorial()">📋 Ver Inventario y Ventas</button>

    <div id="seccionHistorial">
      <h3>Estado de la Nevera</h3>
      <table id="tablaInventario">
        </table>

      <h3>Historial de Ventas</h3>
      <ul id="listaVentas"></ul>
      <button onclick="borrarTodo()" style="width:100%; background:#dc3545; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Borrar Todo</button>
    </div>
  </div>

  <script>
    // 1. INVENTARIO INICIAL
    let inventario = JSON.parse(localStorage.getItem("inventario")) || {
      "Mora": 10, "Mango": 15, "Durazno": 8, "Guayaba": 20, "Lulo": 5, "Fresa": 12, "Tomate de Árbol": 10
    };

    let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

    // 2. ACTUALIZAR VISTA DE STOCK
    function actualizarVistaStock() {
      let p = document.getElementById("producto").value;
      let stock = inventario[p];
      document.getElementById("avisoStock").innerText = "En nevera: " + stock + " lb de " + p;
      
      // Mostrar tabla de inventario completa
      let tabla = document.getElementById("tablaInventario");
      tabla.innerHTML = "<tr><th>Fruta</th><th>Stock (lb)</th></tr>";
      for (let fruta in inventario) {
        tabla.innerHTML += `<tr><td>${fruta}</td><td>${inventario[fruta]}</td></tr>`;
      }
    }

    // 3. GUARDAR VENTA
    function guardar() {
      let p = document.getElementById("producto").value;
      let cInput = document.getElementById("cantidad").value;

      if (cInput === "" || cInput <= 0) {
        alert("Ingresa una cantidad válida");
        return;
      }

      let cant = parseFloat(cInput);

      // VALIDAR SI HAY EN LA NEVERA
      if (cant > inventario[p]) {
        alert("¡No alcanza! Solo tienes " + inventario[p] + " lb de " + p);
        return;
      }

      // Restar de la nevera
      inventario[p] -= cant;
      
      let totalVenta = cant * 5000;
      ventas.push({ producto: p, cantidad: cant, total: totalVenta });

      // Guardar en memoria
      localStorage.setItem("inventario", JSON.stringify(inventario));
      localStorage.setItem("ventas", JSON.stringify(ventas));

      document.getElementById("totalReciente").innerText = "Vendido: $" + totalVenta;
      document.getElementById("cantidad").value = "";
      
      actualizarVistaStock();
      dibujarVentas();
    }

    function dibujarVentas() {
      let lista = document.getElementById("listaVentas");
      lista.innerHTML = "";
      ventas.forEach(v => {
        let li = document.createElement("li");
        li.innerHTML = `<b>${v.producto}</b>: ${v.cantidad} lb - $${v.total}`;
        lista.appendChild(li);
      });
    }

    function toggleHistorial() {
      let s = document.getElementById("seccionHistorial");
      s.style.display = (s.style.display === "none" || s.style.display === "") ? "block" : "none";
    }

    function borrarTodo() {
      if(confirm("¿Borrar todo?")) {
        localStorage.clear();
        location.reload(); // Reinicia la app
      }
    }

    // Iniciar vista
    actualizarVistaStock();
    dibujarVentas();
  </script>

</body>
</html>
