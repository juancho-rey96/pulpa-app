<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpa App Pro - Caja y Nequi 🥭</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 420px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #1a73e8; }
        .stock-info { background: #fff3cd; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; color: #856404; margin-bottom: 20px; border: 1px solid #ffeeba; }
        label { font-weight: 600; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        
        /* Sección de Total */
        .total-box { margin-top: 15px; padding: 15px; background: #e8f0fe; border-radius: 10px; text-align: center; border: 1px solid #1a73e8; }
        .total-box span { font-size: 24px; font-weight: bold; color: #1a73e8; }

        .btn-guardar { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-nequi { width: 100%; padding: 15px; background: #ff0072; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-toggle { width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table th, table td { border: 1px solid #eee; padding: 10px; text-align: left; font-size: 14px; }
        
        .log-item { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #28a745; font-size: 13px; }
        .fecha { font-size: 10px; color: #888; display: block; }
        
        #seccionTablas { display: none; margin-top: 20px; border-top: 2px solid #eee; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registro de Fruta</h2>
        <div class="stock-info" id="avisoStock">Conectando...</div>

        <label>Producto:</label>
        <select id="producto" onchange="actualizarVistaStock()">
            <option value="Mora">Mora 🍇</option>
            <option value="Pera">Pera 🍐</option>
            <option value="Mango">Mango 🥭</option>
            <option value="Durazno">Durazno 🍑</option>
            <option value="Guayaba">Guayaba 🟡</option>
            <option value="Lulo">Lulo 🍈</option>
            <option value="Fresa">Fresa 🍓</option>
            <option value="Tomate de Árbol">Tomate de Árbol 🍅</option>
        </select>

        <label>Cantidad (lb):</label>
        <input type="number" id="cantidad" placeholder="Ej: 2" step="1" oninput="calcularPrecio()">

        <div class="total-box">
            Total a Valor:<br>
            <span id="displayTotal">$ 0</span>
        </div>

        <button class="btn-guardar" onclick="guardar()">Registrar y Guardar</button>
        <button class="btn-nequi" onclick="pagarNequi()">Pagar con Nequi</button>

        <button class="btn-toggle" onclick="toggleSeccion()">📋 Ver Inventario y Ventas</button>

        <div id="seccionTablas">
            <h3>Disponible En Nevera</h3>
            <table id="tablaInventario"></table>
            
</style>

            <h3>Historial de Ventas</h3>
            <div id="listaHistorial">No hay registros.</div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAYJ15P0bWb35dY8sbNuC0_4xcYFsuaz7A",
            authDomain: "pulpaapp-3ec88.firebaseapp.com",
            databaseURL: "https://pulpaapp-3ec88-default-rtdb.firebaseio.com",
            projectId: "pulpaapp-3ec88",
            storageBucket: "pulpaapp-3ec88.firebasestorage.app",
            messagingSenderId: "1036704181260",
            appId: "1:1036704181260:web:1213390bb88350cad09229"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let inventario = {};
        const PRECIO_UNIDAD = 5000;

        db.ref('inventario').on('value', (snapshot) => {
            inventario = snapshot.val() || {};
            actualizarVistaStock();
            dibujarTabla();
        });

        db.ref('historial_ventas').limitToLast(5).on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById("listaHistorial");
            container.innerHTML = "";
            if (data) {
                Object.values(data).reverse().forEach(log => {
                    container.innerHTML += `<div class="log-item"><span class="fecha">${log.fecha}</span><b>${log.fruta}</b>: ${log.cantidad} lb -> <b>$${log.total.toLocaleString()}</b></div>`;
                });
            }
        });

        function calcularPrecio() {
            let cant = parseFloat(document.getElementById("cantidad").value) || 0;
            document.getElementById("displayTotal").innerText = "$ " + (cant * PRECIO_UNIDAD).toLocaleString();
        }

        function actualizarVistaStock() {
            let p = document.getElementById("producto").value;
            let stock = inventario[p] || 0;
            document.getElementById("avisoStock").innerText = "Stock: " + stock + " lb de " + p;
        }

        function dibujarTabla() {
            let tabla = document.getElementById("tablaInventario");
            tabla.innerHTML = "<tr><th>Fruta</th><th>Stock</th></tr>";
            for (let fruta in inventario) {
                tabla.innerHTML += `<tr><td>${fruta}</td><td>${inventario[fruta]} lb</td></tr>`;


        function guardar() {
            let p = document.getElementById("producto").value;
            let cant = parseFloat(document.getElementById("cantidad").value);
            let totalVenta = cant * PRECIO_UNIDAD;
            let fecha = new Date().toLocaleString();

            if (isNaN(cant) || cant <= 0 || cant > (inventario[p] || 0)) {
                alert("Cantidad no válida."); return;
            }

            let nuevoStock = Math.round((inventario[p] - cant) * 100) / 100;
            db.ref('inventario/' + p).set(nuevoStock);
            db.ref('historial_ventas').push({ fruta: p, cantidad: cant, total: totalVenta, fecha: fecha });

            document.getElementById("cantidad").value = "";
            document.getElementById("displayTotal").innerText = "$ 0";
            alert("Venta registrada con éxito.");
        }

        function pagarNequi() {
            let numeroNequi = "3114413297"; 
            let total = document.getElementById("displayTotal").innerText;
            
            navigator.clipboard.writeText(numeroNequi).then(() => {
                alert("Número " + numeroNequi + " copiado.\nTotal: " + total + "\n\nRedirigiendo a Nequi...");
                window.location.href = "nequi://"; 
            });
        }

        function toggleSeccion() {
            let s = document.getElementById("seccionTablas");
            s.style.display = (s.style.display === "none" || s.style.display === "") ? "block" : "none";

            //NUEVO
            <div style="background: #eefaf0; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #28a745;">
    <h4 style="margin:0 0 10px 0; color: #28a745; text-align: center;">📥 Cargar Inventario</h4>
    <p style="font-size: 12px; color: #666; margin-bottom: 10px;">Selecciona la fruta arriba y escribe cuánto vas a sumar:</p>
    
    <input type="number" id="cantidadNueva" placeholder="Libras que llegaron" step="0.1" style="border: 1px solid #28a745;">
    
    <button onclick="sumarStock()" style="width:100%; background:#28a745; color:white; border:none; padding:12px; border-radius:8px; margin-top:10px; font-weight:bold; cursor:pointer;">
        Sumar a la Nevera
    </button>
</div>

            //NUEVO
            function sumarStock() {
    let p = document.getElementById("producto").value; // Toma la fruta seleccionada en el menú principal
    let cantNueva = parseFloat(document.getElementById("cantidadNueva").value);

    if (isNaN(cantNueva) || cantNueva <= 0) {
        alert("Por favor, ingresa una cantidad válida para sumar.");
        return;
    }

    // Calculamos el nuevo total (Lo que hay en Firebase + lo que llegó)
    let stockActual = inventario[p] || 0;
    let nuevoTotal = Math.round((stockActual + cantNueva) * 100) / 100;

    // ACTUALIZAMOS EN FIREBASE
    db.ref('inventario/' + p).set(nuevoTotal)
        .then(() => {
            alert("✅ ¡Éxito! Ahora tienes " + nuevoTotal + " lb de " + p);
            document.getElementById("cantidadNueva").value = ""; // Limpia el campo
        })
        .catch((error) => {
            alert("Error al actualizar: " + error.message);
        });
}
        }
    </script>
</body>
</html>
